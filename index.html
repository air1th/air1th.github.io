<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>终焉：时痕之心</title>
    <link rel="stylesheet" href="css/style.css?v=5" />
  </head>
  <body>
    <div id="app">
      <!-- 星空画布 -->
      <canvas id="starfield"></canvas>

      <!-- ============================================================ -->
      <!-- 标题画面 -->
      <!-- ============================================================ -->
      <div id="title-screen">
        <div class="title-content">
          <div class="title-ornament"></div>
          <h1>终焉：时痕之心</h1>
          <div class="title-ornament short"></div>
          <p class="subtitle">THE HEART OF TIME TRACES</p>
          <div class="title-ornament"></div>
        </div>
        <div class="title-buttons">
          <button class="title-btn" id="btn-start">开 始 阅 读</button>
          <button class="title-btn" id="btn-load">继 续 阅 读</button>
          <button class="title-btn" id="btn-endings">结 局 收 集</button>
          <button class="title-btn" id="btn-about">关 于</button>
        </div>
        <p class="title-hint">点击开始，以阅读模式展开故事</p>
      </div>

      <!-- ============================================================ -->
      <!-- 小说阅读画面 -->
      <!-- ============================================================ -->
      <div id="game-screen" class="hidden">
        <!-- 顶部阅读状态栏 -->
        <div id="top-bar">
          <div id="reader-chapter-label">序幕</div>
          <div class="top-bar-right">
            <button id="back-btn" title="返回上一页" class="hidden">
              <span class="back-arrow">←</span>
            </button>
            <button id="speed-btn" title="打字速度">
              <span id="speed-label">×1</span>
            </button>
            <button id="menu-btn" title="菜单">
              <span></span><span></span><span></span>
            </button>
          </div>
        </div>

        <!-- 小说文本容器 -->
        <div id="novel-container">
          <div id="novel-text"></div>
          <div id="novel-cursor"></div>
        </div>

        <!-- 继续提示 -->
        <div id="continue-hint">
          <span>轻触任意位置继续</span>
        </div>

        <!-- 菜单下拉 -->
        <div id="menu-dropdown" class="hidden">
          <button class="menu-item" id="mu-save">保存进度</button>
          <button class="menu-item" id="mu-load">读取存档</button>
          <button class="menu-item" id="mu-settings">阅读设置</button>
          <button class="menu-item" id="mu-return">返回标题</button>
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 存档 / 读档 覆盖层 -->
      <!-- ============================================================ -->
      <div id="save-load-overlay">
        <div class="sl-header">
          <h2 id="sl-title">存档管理</h2>
          <button class="sl-close" id="sl-close">&times;</button>
        </div>
        <div class="sl-tabs">
          <button class="sl-tab active" id="tab-save">保存</button>
          <button class="sl-tab" id="tab-load">读取</button>
        </div>
        <div class="sl-grid" id="sl-grid"></div>
        <div class="sl-actions">
          <button class="sl-action-btn" id="btn-export">导出存档</button>
          <button class="sl-action-btn" id="btn-import">导入存档</button>
          <input
            type="file"
            id="import-file"
            accept=".json"
            style="display: none"
          />
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 设置覆盖层 -->
      <!-- ============================================================ -->
      <div id="settings-overlay">
        <div class="settings-panel">
          <h3>阅 读 设 置</h3>
          <div class="settings-row">
            <span>文字出现速度</span>
            <div class="speed-options">
              <button data-speed="1">慢</button>
              <button data-speed="2">适中</button>
              <button data-speed="3" class="active">标准</button>
              <button data-speed="4">快</button>
              <button data-speed="5">极速</button>
            </div>
          </div>
          <div class="settings-row">
            <span>字号</span>
            <div class="size-options">
              <button data-size="small">小</button>
              <button data-size="medium" class="active">中</button>
              <button data-size="large">大</button>
            </div>
          </div>
          <button class="settings-close" id="settings-close">关 闭</button>
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 关于 覆盖层 -->
      <!-- ============================================================ -->
      <div id="about-overlay">
        <div class="modal-panel">
          <h3>终焉：时痕之心</h3>
          <div class="modal-ornament"></div>
          <div class="about-body">
            <p>一段关于秩序与混沌、记忆与抉择的奇幻故事。</p>
            <div class="about-controls">
              <div class="about-control-item">
                <span class="about-key">点击画面 / 空格 / 回车</span>
                <span class="about-desc">跳过动画 · 继续阅读</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">第一下点击</span>
                <span class="about-desc">显示当前页全部文字</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">第二下点击</span>
                <span class="about-desc">进入下一页</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">键盘 1 / 2 / 3</span>
                <span class="about-desc">选择选项</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">← 返回按钮</span>
                <span class="about-desc">回到上一页</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">×1 / ×2 / ×4</span>
                <span class="about-desc">切换打字速度</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">右上角菜单</span>
                <span class="about-desc">保存 · 读取 · 设置</span>
              </div>
              <div class="about-control-item">
                <span class="about-key">ESC</span>
                <span class="about-desc">关闭面板</span>
              </div>
            </div>
          </div>
          <button class="modal-close" id="about-close">关 闭</button>
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 自动存档提示 覆盖层 -->
      <!-- ============================================================ -->
      <div id="autosave-overlay">
        <div class="modal-panel">
          <h3>检测到上次阅读进度</h3>
          <div class="modal-ornament"></div>
          <div class="autosave-body">
            <p class="autosave-chapter" id="autosave-chapter"></p>
            <p class="autosave-time" id="autosave-time"></p>
          </div>
          <div class="autosave-buttons">
            <button class="modal-btn primary" id="autosave-continue">
              继 续 阅 读
            </button>
            <button class="modal-btn" id="autosave-new">重 新 开 始</button>
          </div>
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 结局覆盖层 -->
      <!-- ============================================================ -->
      <div id="ending-overlay">
        <span class="ending-type" id="ending-type">结局</span>
        <span class="ending-title" id="ending-title"></span>
        <div class="ending-ornament"></div>
        <p class="ending-text" id="ending-text"></p>
        <div class="ending-buttons">
          <button class="ending-btn" id="ending-restart">重 新 开 始</button>
          <button class="ending-btn" id="ending-back">返 回 上 一 节 点</button>
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 结局收集 覆盖层 -->
      <!-- ============================================================ -->
      <div id="endings-overlay">
        <div class="sl-header">
          <h2>结 局 收 集</h2>
          <button class="sl-close" id="endings-close">&times;</button>
        </div>
        <div class="sl-grid" id="endings-grid"></div>
      </div>

      <!-- ============================================================ -->
      <!-- 结局详情 覆盖层 -->
      <!-- ============================================================ -->
      <div id="ending-detail-overlay">
        <div class="modal-panel">
          <span class="ending-type" id="ending-detail-type">结局</span>
          <h3 id="ending-detail-title" style="margin-top: 4px"></h3>
          <div class="modal-ornament"></div>
          <p class="ending-detail-text" id="ending-detail-text"></p>
          <button class="modal-close" id="ending-detail-close">关 闭</button>
        </div>
      </div>

      <!-- ============================================================ -->
      <!-- 确认对话框 -->
      <!-- ============================================================ -->
      <div id="confirm-overlay">
        <div class="modal-panel">
          <h3 id="confirm-title">提示</h3>
          <div class="modal-ornament"></div>
          <p class="confirm-message" id="confirm-message"></p>
          <div class="confirm-buttons">
            <button class="modal-btn primary" id="confirm-ok">确 定</button>
            <button class="modal-btn" id="confirm-cancel">取 消</button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/storage.js?v=5"></script>
    <script src="js/config.js?v=5"></script>
    <script src="js/engine.js?v=5"></script>
    <script src="js/ui.js?v=5"></script>
    <script src="js/app.js?v=5"></script>
  </body>
</html>
